<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>¡The Xaliverse!</title>
        <script defer src="./src/logic/Xaliverse.js"></script>
        <link rel="stylesheet" href="./src/ui/Style.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    
    <body>

        <h1 class="titulo">¡El Mundo De Xaliverse!</h1>

        <section id="seleccionar-mascota" aria-label="Seleccionar mascota">
            
            <h2 class="subtitulo">💥Elige tu mascota:</h2>
            
            <div id="contenedor-botones" class="tarjetas"></div>

            <button id="boton-mascota">Seleccionar</button>

        </section>

        <section id="ver-mapa" aria-label="Opciones del Mapa">

            <h2 class="subtitulo">💠ZONA DE MOVIMIENTO DE XALIBURZ💠</h2>
            <canvas id="mapa"></canvas>
            <button onmouseup="detenerMovimiento()" onmousedown="moverArriba()">Arriba</button>

            <div>
                <button onmouseup="detenerMovimiento()" onmousedown="moverIzquierda()">Izquierda</button>
                <button onmouseup="detenerMovimiento()" onmousedown="moverAbajo()">Abajo</button>
                <button onmouseup="detenerMovimiento()" onmousedown="moverDerecha()">Derecha</button>

            </div>

        </section>

        <section id="seleccionar-ataque">
            <h1 class="titulo">¡El Mundo Xaliverse!</h1>
            <h2 class="subtitulo">Elige tu ataque:</h2>

            <div id="contenedor-ataques" class="botones-ataques" >
            </div>

            <div id="mensajes">
                <p id="resultado">ES HORA DEL DUELO</p>
                <div id="reiniciar">
                    <button id="Reiniciar">Reiniciar</button>
                </div>
            </div>

            <div  class="registro-juego">
                <div>
                    <p id="vidas-jugador">0</p>
                    <p id="mascota-jugador"></p>
                    <div id="ataques-del-jugador"></div>
                </div>

                <div>
                    <p id="vidas-enemigo">0</p>
                    <p id="mascota-enemigo"></p>
                    <div id="ataques-del-enemigo"></div>
                </div>
            </div>
            
        </section>
    </body>
</html>
