<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xaliverse!</title>
    <script defer src="./src/logic/Xaliverse2.js"></script>
    <link rel="stylesheet" href="./src/ui/Syle2.css">

</head>

<body>

    <h1 id="titulo">¡Xaliverse!</h1>

    <section id="seleccionar-mascota">

        <h2>Selecciona tu mascota</h2>

        <div id="mascota-hipodoge">

            <label for="hipodoge">Hipodoge</label>
            <input type="radio" name="xaliverse" id="hipodoge"><br>

        </div>

        <div id="mascota-capipepo">

            <label for="capipepo">Capipepo</label>
            <input type="radio" name="xaliverse" id="capipepo"><br>

        </div>

        <div id="mascota-ratigueya">

            <label for="ratigueya">Ratigueya</label>
            <input type="radio" name="xaliverse" id="ratigueya"><br>

        </div>


        
        <button id="btn-seleccionar-mascota">Seleccionar</button>

    </section>

    <section id="seleccionar-ataque">

        <h2>Selecciona tu ataque</h2>

        <p>Tu mascota <span id="mascota-jugador">Miguel</span> tiene <span id="vidas">3</span> vidas</p>
        <p>La mascota del enemigo <span id="mascota-enemiga"></span> tiene <span id="vidas-enemigo">3</span> vidas</p>

        <button id="boton-fuego">Fuego</button>
        <button id="boton-agua">Agua</button>
        <button id="boton-tierra">Tierra</button>

    </section>

    <section id="anuncio-combate">
        
        <h2>Combate</h2>
        

    </section>

    <p id="boton-reinicio">
        Si quieres volver a jugar dale click al <strong>Botón</strong> <br> 
        <button>Volver a jugar</button>
    </p>

</body>

</html>
